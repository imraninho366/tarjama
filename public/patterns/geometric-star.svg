<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <g opacity="0.04" stroke="#C9A84C" stroke-width="0.5">
    <!-- 8-pointed star (Rub' al-Hizb) -->
    <polygon points="60,10 70,40 100,30 80,55 110,60 80,65 100,90 70,80 60,110 50,80 20,90 40,65 10,60 40,55 20,30 50,40"/>
    <!-- Inner octagon -->
    <polygon points="60,25 75,42 92,42 85,58 92,78 75,78 60,95 45,78 28,78 35,58 28,42 45,42"/>
    <!-- Center circle -->
    <circle cx="60" cy="60" r="12"/>
    <!-- Decorative inner cross -->
    <line x1="60" y1="35" x2="60" y2="85"/>
    <line x1="35" y1="60" x2="85" y2="60"/>
    <line x1="42" y1="42" x2="78" y2="78"/>
    <line x1="78" y1="42" x2="42" y2="78"/>
  </g>
</svg>